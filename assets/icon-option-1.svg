<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff3355"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00ff8844"/>
      <stop offset="100%" stop-color="#ff335500"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg1)"/>
  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="78" fill="none" stroke="#8b5cf622" stroke-width="2"/>
  <!-- Glow behind bars -->
  <g filter="url(#blur1)" opacity="0.5">
    <rect x="68" y="120" width="28" height="260" rx="4" fill="url(#bar1)"/>
    <rect x="112" y="80" width="28" height="300" rx="4" fill="url(#bar1)"/>
    <rect x="156" y="140" width="28" height="240" rx="4" fill="url(#bar1)"/>
    <rect x="200" y="60" width="28" height="320" rx="4" fill="url(#bar1)"/>
    <rect x="244" y="40" width="28" height="340" rx="4" fill="url(#bar1)"/>
    <rect x="288" y="70" width="28" height="310" rx="4" fill="url(#bar1)"/>
    <rect x="332" y="100" width="28" height="280" rx="4" fill="url(#bar1)"/>
    <rect x="376" y="160" width="28" height="220" rx="4" fill="url(#bar1)"/>
    <rect x="420" y="200" width="28" height="180" rx="4" fill="url(#bar1)"/>
  </g>
  <!-- Spectrum bars -->
  <rect x="68" y="120" width="28" height="260" rx="4" fill="url(#bar1)" opacity="0.95"/>
  <rect x="112" y="80" width="28" height="300" rx="4" fill="url(#bar1)" opacity="0.95"/>
  <rect x="156" y="140" width="28" height="240" rx="4" fill="url(#bar1)" opacity="0.95"/>
  <rect x="200" y="60" width="28" height="320" rx="4" fill="url(#bar1)" opacity="0.95"/>
  <rect x="244" y="40" width="28" height="340" rx="4" fill="url(#bar1)" opacity="0.95"/>
  <rect x="288" y="70" width="28" height="310" rx="4" fill="url(#bar1)" opacity="0.95"/>
  <rect x="332" y="100" width="28" height="280" rx="4" fill="url(#bar1)" opacity="0.95"/>
  <rect x="376" y="160" width="28" height="220" rx="4" fill="url(#bar1)" opacity="0.95"/>
  <rect x="420" y="200" width="28" height="180" rx="4" fill="url(#bar1)" opacity="0.95"/>
  <!-- Base line -->
  <line x1="50" y1="380" x2="462" y2="380" stroke="#ffffff22" stroke-width="1"/>
  <!-- "AP" text -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="8" opacity="0.9">AUDIO PRIME</text>
</svg>
